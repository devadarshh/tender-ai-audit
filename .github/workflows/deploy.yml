name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Ensure only one workflow runs at a time for each branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Code Quality & Preparation
  # ---------------------------------------------------------------------------
  quality:
    name: 🛡️ Quality & Types
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 💅 Check Formatting
        run: npm run format:check

      - name: 🔍 Lint
        run: npm run lint

      - name: 🟦 Type Check
        run: npm run typecheck

      - name: 🔐 Audit Dependencies (High/Critical only)
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Phase 2: Build Verification
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build App
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🚀 Build Next.js
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL: postgresql://dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-secret
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
        run: npm run build

  # ---------------------------------------------------------------------------
  # Phase 3: Containerization (Production Release)
  # Only runs on push to main branch
  # ---------------------------------------------------------------------------
  docker:
    name: 🐳 Docker Build & Push
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=tag

      - name: 🚀 Build and Push (Next.js & Worker)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_ENV_VALIDATION=1

