name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Ensure only one workflow runs at a time for each branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: Code Quality & Preparation
  # ---------------------------------------------------------------------------
  quality:
    name: 🛡️ Quality & Types
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 💅 Check Formatting
        run: npm run format:check

      - name: 🔍 Lint
        run: npm run lint

      - name: 🟦 Type Check
        run: npm run typecheck

      - name: 🔐 Audit Dependencies (High/Critical only)
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Phase 2: Build Verification
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build App
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Generate Prisma Client
        run: npx prisma generate

      - name: 🚀 Build Next.js
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL: postgresql://dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-secret
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
        run: npm run build

  # ---------------------------------------------------------------------------
  # Phase 3: Containerization (Production Release)
  # ---------------------------------------------------------------------------
  docker:
    name: 🐳 Docker Build & Push
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: 🚀 Build and Push APP
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Build and Push WORKER
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:latest
            ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Phase 4: Production Deployment (EC2)
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to EC2
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚚 Setup project directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/tender-ai-audit
        
      - name: 📂 Scp docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/tender-ai-audit"
          strip_components: 0

      - name: 🚀 Update Services on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
            GITHUB_REPOSITORY: ${{ github.repository }}
            IMAGE_TAG: ${{ github.sha }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            AUTH_URL: ${{ secrets.AUTH_URL }}
            AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
            AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
            QDRANT_URL: ${{ secrets.QDRANT_URL }}
            GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
            HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_REPOSITORY,IMAGE_TAG,AUTH_SECRET,AUTH_URL,AUTH_GOOGLE_ID,AUTH_GOOGLE_SECRET,DATABASE_URL,UPSTASH_REDIS_URL,QDRANT_URL,GOOGLE_GENERATIVE_AI_API_KEY,HUGGINGFACE_API_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY
          script: |
            cd ~/tender-ai-audit
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

